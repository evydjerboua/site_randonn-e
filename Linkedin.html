    <style>
        /* Global Styles */
        body {
            background-color: #184973; /* Couleur de fond personnalisée */
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Link Styles */
        a {
            color: #ffffff;
            font-size: 20px;
            text-decoration: none;
            font-weight: bold;
            background-color: #00aaff;
            padding: 10px 20px;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s, transform 0.3s;
        }

        a:hover {
            background-color: #0088cc;
            transform: scale(1.05);
        }

        /* Responsive Styles */
        @media (max-width: 600px) {
            a {
                font-size: 18px;
                padding: 8px 16px;
            }
        }
