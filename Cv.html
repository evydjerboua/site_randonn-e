	<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon CV</title>
    <style>
        /* Global Styles */
        body {
            background-color: #f4f4f4;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: #333;
        }

        /* Container */
        .container {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 1000px;
        }

        /* Title */
        h1 {
            font-size: 36px;
            color: #e60000;
            margin-bottom: 20px;
        }

        /* Embed PDF container */
        .cv-container {
            background-color: #f8f8f8;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        /* PDF iframe styling */
        iframe {
            border: none;
            width: 100%;
            height: 800px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mon CV</h1>
        <div class="cv-container">
            <iframe src="cv.pdf" width="100%" height="800" name="fenetre1"></iframe>
        </div>
    </div>

</body>
</html>

</body>
</html>
