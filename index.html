/* ===== Fond rouge animé ===== */
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    color: white;
    background: linear-gradient(-45deg, #7f0000, #b31217, #e52d27, #ff4b2b);
    background-size: 400% 400%;
    animation: backgroundMove 12s ease infinite;
}

/* Animation du dégradé */
@keyframes backgroundMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* ===== Animation titre principal ===== */
h1 {
    margin-top: 40px;
    font-size: 32px;
    animation: slideDown 2s ease;
}

/* ===== Animation sous-titre ===== */
h2 {
    margin-top: 20px;
    animation: fadeIn 3s ease;
}

/* Animation apparition */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Animation descente */
@keyframes slideDown {
    from { transform: translateY(-50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

/* ===== Liens stylés ===== */
a {
    display: inline-block;
    margin: 12px;
    padding: 10px 20px;
    text-decoration: none;
    color: #b31217;
    background: white;
    border-radius: 25px;
    font-weight: bold;
    transition: 0.3s;
    animation: fadeIn 2s ease;
}

/* Effet au survol */
a:hover {
    background: #ff4b2b;
    color: white;
    transform: scale(1.1);
    box-shadow: 0 0 15px white;
}

</style>
