	<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Présentation personnelle</title>
    <style>
        /* Global Styles */
        body {
            background-color: #f8f0f0;
            font-family: 'Arial', sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Container */
        .container {
            background-color: #ffb3b3;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 600px;
        }

        /* Title */
        h1 {
            font-size: 36px;
            color: #e60000;
            margin-bottom: 10px;
        }

        /* Subtitle */
        h2 {
            font-size: 28px;
            color: #660000;
            margin: 10px 0;
        }

        /* Section Titles */
        h3 {
            font-size: 20px;
            color: #4d4d4d;
            margin: 8px 0;
        }

        /* Styling the background */
        .background {
            background-color: pink;
            border-radius: 8px;
            padding: 20px;
        }

        /* Footer (if needed) */
        footer {
            margin-top: 20px;
            color: #999;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Présentation personnelle</h1>
        <div class="background">
            <h2>Evy Djerboua</h2>
            <h3>Mon parcours: Licence STAPS Management du sport</h3>
            <h3>Centre d'intérêts: sport, voyage et musique</h3>
            <h3>Projet professionnel: Organiser des évènements sportifs</h3>
        </div>
    </div>

</body>
</html>

</body>
</html>
